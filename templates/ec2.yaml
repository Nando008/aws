AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 creada desde GitHub Actions

Resources:

  MyEC2:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: us-east-1a
      ImageId: ami-0cca150d127c2216f
      InstanceType: t3.micro

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          IP=$(curl -s http://169.254.169.254/latest/meta-data/local-ipv4)
          echo "Hello World" > /tmp/hello.txt
          echo "IP de la instancia: $IP" >> /tmp/hello.txt

      Tags:
        - Key: Name
          Value: EC2-GitHubActions

Outputs:

  InstanceId:
    Value: !Ref MyEC2